name: Deploy to GitHub Pages

on:
  # Ejecuta este flujo de trabajo cada vez que hagas push a la rama principal
  push:
    branches: [ main, master ]
  # Permite ejecutar esto manualmente desde la pestaña "Actions"
  workflow_dispatch:

# Permisos necesarios para que la acción pueda publicar en tu repositorio
permissions:
  contents: read
  pages: write
  id-token: write

# Permite que solo se ejecute un despliegue a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # Cambia esto si tu proyecto Astro no está en la raíz del repositorio

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      - name: Install, build, and upload your site
        uses: withastro/action@v2
        # with:
          # Si tienes problemas de versión de Node, descomenta la siguiente línea:
          # node-version: 20

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4